name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  # Required for npm provenance attestation
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish  # Requires manual approval in GitHub Environments
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci --ignore-scripts

      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      # Trusted Publisher uses OIDC (id-token: write above) — no NPM_TOKEN secret needed.
      # --provenance links the published package to this exact commit and workflow run.
      - run: npm publish --provenance --access public
