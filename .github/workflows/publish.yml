name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  # Required for npm provenance attestation
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish  # Requires manual approval in GitHub Environments
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci --ignore-scripts

      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      # --provenance links the published package to this exact commit and workflow run,
      # allowing consumers to verify the build origin (npm provenance / SLSA level 2).
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
