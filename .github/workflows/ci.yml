name: CI

on:
  push:
    branches: [main]
  pull_request:

# Minimal permissions — GITHUB_TOKEN can only read repo contents.
# Individual jobs override this only when they need more.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      # --ignore-scripts prevents malicious lifecycle scripts in dependencies
      # from running during install.
      - run: npm ci --ignore-scripts
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
